services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-stub}
      - OPENAI_COMPAT_BASE_URL=${OPENAI_COMPAT_BASE_URL:-}
      - OPENAI_COMPAT_API_KEY=${OPENAI_COMPAT_API_KEY:-}
      - OPENAI_COMPAT_MODEL=${OPENAI_COMPAT_MODEL:-}
      - GIGACHAT_BASE_URL=${GIGACHAT_BASE_URL:-https://gigachat.devices.sberbank.ru/api/v1}
      - GIGACHAT_API_KEY=${GIGACHAT_API_KEY:-}
      - GIGACHAT_AUTHORIZATION_KEY=${GIGACHAT_AUTHORIZATION_KEY:-}
      - GIGACHAT_MODEL=${GIGACHAT_MODEL:-}
      - GIGACHAT_VERIFY_TLS=${GIGACHAT_VERIFY_TLS:-false}
      - GIGACHAT_MAX_TOKENS=${GIGACHAT_MAX_TOKENS:-1400}
      - GIGACHAT_TIMEOUT_SECONDS=${GIGACHAT_TIMEOUT_SECONDS:-90}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS:-*}
      # Auth / DB
      - DB_HOST=${DB_HOST:-localhost}
      - DB_PORT=${DB_PORT:-3306}
      - DB_NAME=${DB_NAME:-converter_agent}
      - DB_USER=${DB_USER:-converter_agent}
      - DB_PASSWORD=${DB_PASSWORD:-change-me}
      - JWT_SECRET=${JWT_SECRET:-change-me-to-a-long-random-string}
      - JWT_ACCESS_EXPIRES_MINUTES=${JWT_ACCESS_EXPIRES_MINUTES:-60}
      - RECAPTCHA_V2_SITE_KEY=${RECAPTCHA_V2_SITE_KEY:-}
      - RECAPTCHA_V2_SECRET_KEY=${RECAPTCHA_V2_SECRET_KEY:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - AUTH_CODE_TTL_SECONDS=${AUTH_CODE_TTL_SECONDS:-600}
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:8000}
      - VITE_RECAPTCHA_SITE_KEY=${RECAPTCHA_V2_SITE_KEY:-}
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
