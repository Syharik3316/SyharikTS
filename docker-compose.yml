# PostgreSQL is external (not defined here). С network_mode: host backend делит
# сеть с хостом — в DATABASE_URL используйте 127.0.0.1:5432. Nginx обращается к 127.0.0.1:8000.
services:
  backend:
    build:
      context: ./backend
    network_mode: host
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-stub}
      - OPENAI_COMPAT_BASE_URL=${OPENAI_COMPAT_BASE_URL:-}
      - OPENAI_COMPAT_API_KEY=${OPENAI_COMPAT_API_KEY:-}
      - OPENAI_COMPAT_MODEL=${OPENAI_COMPAT_MODEL:-}
      - GIGACHAT_BASE_URL=${GIGACHAT_BASE_URL:-https://gigachat.devices.sberbank.ru/api/v1}
      - GIGACHAT_API_KEY=${GIGACHAT_API_KEY:-}
      - GIGACHAT_AUTHORIZATION_KEY=${GIGACHAT_AUTHORIZATION_KEY:-}
      - GIGACHAT_MODEL=${GIGACHAT_MODEL:-}
      - GIGACHAT_VERIFY_TLS=${GIGACHAT_VERIFY_TLS:-false}
      - GIGACHAT_MAX_TOKENS=${GIGACHAT_MAX_TOKENS:-1400}
      - GIGACHAT_TIMEOUT_SECONDS=${GIGACHAT_TIMEOUT_SECONDS:-90}
      - LANGFUSE_ENABLED=${LANGFUSE_ENABLED:-false}
      - LANGFUSE_HOST=${LANGFUSE_HOST:-https://cloud.langfuse.com}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_ENV=${LANGFUSE_ENV:-local}
      - LANGFUSE_RELEASE=${LANGFUSE_RELEASE:-}
      - OCR_LANG=${OCR_LANG:-rus+eng}
      - OCR_PSM=${OCR_PSM:-6}
      - OCR_FALLBACK_PSM=${OCR_FALLBACK_PSM:-4}
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS:-*}
      - DATABASE_URL=${DATABASE_URL:-}
      - JWT_SECRET=${JWT_SECRET:-}
      - JWT_ACCESS_EXPIRE_MINUTES=${JWT_ACCESS_EXPIRE_MINUTES:-15}
      - JWT_REFRESH_EXPIRE_DAYS=${JWT_REFRESH_EXPIRE_DAYS:-7}
      - VERIFICATION_CODE_TTL_MINUTES=${VERIFICATION_CODE_TTL_MINUTES:-15}
      - RESEND_VERIFICATION_COOLDOWN_SECONDS=${RESEND_VERIFICATION_COOLDOWN_SECONDS:-60}
      - RECAPTCHA_SECRET_KEY=${RECAPTCHA_SECRET_KEY:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USE_TLS=${SMTP_USE_TLS:-true}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-}
    volumes:
      - ./backend:/app

volumes: {}
